name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Clean coverage & cache
        run: |
          rm -rf coverage
          npx jest --clearCache || true

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false --no-cache

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Thurferr_todomvc-react
            -Dsonar.organization=thurferr
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/cypress/**,**/dist/**,**/*.test.*,**/*.spec.*,**/coverage/**
            -Dsonar.coverage.exclusions=**/babel.config.js,**/jest.config.js,**/jest.setup.js,**/cypress.config.js,**/webpack*.js